<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Авто•Майстер — Запис на сервіс</title>
    <meta
      name="description"
      content="Онлайн-запис на автосервіс. Заміна масла, діагностика, гальма, шини. Пн–Сб 09:00–18:00"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <div>
          <a class="logo-name" href="index.html">Авто<span>•</span>Майстер</a>
          <div class="logo-tagline">Автосервіс</div>
        </div>
      </div>

      <div class="lang-switcher">
        <a href="index.html" class="active">UA</a>
        <a href="index.de.html">DE</a>
      </div>

      <div class="header-contact">
        <div>Пн–Сб, 09:00–18:00</div>
        <a href="tel:+380661234567">+38 (066) 123-45-67</a>
      </div>
    </header>

    <!-- HERO -->
    <section class="hero">
      <h1 class="hero-headline">
        Запис<br />на <span class="accent">сервіс</span>
      </h1>
      <div class="hero-meta">
        <div class="hero-badge">Онлайн-запис</div>
        <div class="hero-sub">Підтвердження на пошту</div>
      </div>
    </section>

    <!-- WIZARD STEPS -->
    <nav class="wizard-steps" aria-label="Кроки запису">
      <div class="step active" id="nav-step-1">
        <div class="step-num">1</div>
        <span class="step-label">Послуга</span>
      </div>
      <div class="step" id="nav-step-2">
        <div class="step-num">2</div>
        <span class="step-label">Дата і час</span>
      </div>
      <div class="step" id="nav-step-3">
        <div class="step-num">3</div>
        <span class="step-label">Ваші дані</span>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="main">
      <!-- STEP 1 -->
      <div class="wizard-panel" id="step-1">
        <div class="section-label">Оберіть послугу</div>
        <div class="services-grid" id="services-grid"></div>
        <div
          class="btn-row"
          style="border-top: none; justify-content: flex-end; margin-top: 24px"
        >
          <button class="btn-next" id="btn-next-1">Далі</button>
        </div>
      </div>

      <!-- STEP 2 -->
      <div class="wizard-panel hidden" id="step-2">
        <div class="section-label">Оберіть дату</div>
        <div class="calendar-section">
          <div id="calendar-container"></div>
        </div>
        <div class="section-label" style="margin-top: 32px">Доступний час</div>
        <div id="time-slots"></div>
        <div class="btn-row">
          <button class="btn-back" id="btn-back-2">Назад</button>
          <button class="btn-next" id="btn-next-2">Далі</button>
        </div>
      </div>

      <!-- STEP 3 -->
      <div class="wizard-panel hidden" id="step-3">
        <div class="section-label">Ваші дані</div>

        <div id="booking-summary" class="booking-summary"></div>

        <div class="form-group">
          <label class="form-label" for="field-name">Ім'я *</label>
          <input
            class="form-input"
            id="field-name"
            type="text"
            placeholder="Іван Петренко"
            autocomplete="name"
          />
          <div class="form-error" id="error-name"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="field-phone">Телефон *</label>
          <input
            class="form-input"
            id="field-phone"
            type="tel"
            placeholder="+38 (0__) ___-__-__"
            autocomplete="tel"
          />
          <div class="form-error" id="error-phone"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="field-email"
            >Email
            <span style="color: var(--text-muted); font-size: 11px"
              >(необов'язково)</span
            ></label
          >
          <input
            class="form-input"
            id="field-email"
            type="email"
            placeholder="ivan@gmail.com"
            autocomplete="email"
          />
          <div class="form-error" id="error-email"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="field-comment"
            >Марка авто / коментар</label
          >
          <input
            class="form-input"
            id="field-comment"
            type="text"
            placeholder="Toyota Camry 2019, бензин"
          />
        </div>

        <div class="btn-row">
          <button class="btn-back" id="btn-back-3">Назад</button>
          <button class="btn-next" id="btn-submit">Підтвердити запис</button>
        </div>
      </div>

      <!-- SUCCESS -->
      <div class="wizard-panel hidden" id="step-success">
        <div class="success-screen">
          <div class="success-icon">
            <svg viewBox="0 0 24 24"><polyline points="4,12 9,17 20,6" /></svg>
          </div>
          <h2 class="success-title">Запис прийнято!</h2>
          <p class="success-text">
            Ваш запис успішно оформлено.<br />
            Підтвердження надіслано на вашу пошту.
          </p>
          <div class="success-detail booking-summary"></div>
          <button class="btn-restart" id="btn-restart">Новий запис</button>
        </div>
      </div>
    </main>

    <!-- DATA: Services (Ukrainian) -->

    </script>
    <script src="js/main.js"></script>
  </body>
</html>
